# Weekly mutation testing (Phase 16 S4). allowed-to-fail until baseline ≥70%.
name: Stryker Weekly

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  stryker:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run stryker
