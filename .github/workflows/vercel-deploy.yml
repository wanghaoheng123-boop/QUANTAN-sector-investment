name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@50.37.3

      # Inject env vars from GitHub secrets (must be set in GitHub → Settings → Secrets)
      # Fall back to placeholder so build can proceed if secrets are not yet configured
      - name: Set build environment variables
        run: |
          echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-changeme-build-only-placeholder-$(date +%s)}" >> $GITHUB_ENV
          echo "NEXTAUTH_URL=${NEXTAUTH_URL:-https://quantan.vercel.app}" >> $GITHUB_ENV
          echo "NEXTAUTH_SECRET set: [${NEXTAUTH_SECRET:+yes}]"
          echo "NEXTAUTH_URL set: [${NEXTAUTH_URL:+yes}]"

      - name: Build Project Artifacts
        run: |
          echo "vercel.json content:"
          cat vercel.json
          echo ""
          echo "NEXTAUTH_SECRET in env: [${NEXTAUTH_SECRET:+yes}]"
          echo "NEXTAUTH_URL in env: [${NEXTAUTH_URL}]"
          echo "Building with Vercel..."
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
