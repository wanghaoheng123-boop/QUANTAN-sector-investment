name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set build environment variables
        run: |
          echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-build-placeholder-$(date +%s)}" >> $GITHUB_ENV
          echo "NEXTAUTH_URL=${NEXTAUTH_URL:-https://quantan.vercel.app}" >> $GITHUB_ENV

      - name: Build Project Artifacts
        run: |
          echo "=== Environment ==="
          env | grep -E "NEXTAUTH|NODE|VERCEL" || true
          echo ""
          echo "=== Running npm run build ==="
          npm run build 2>&1
          BUILD_EXIT=$?
          echo ""
          echo "=== Build exit code: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD FAILED — check output above for errors"
          fi
          exit $BUILD_EXIT

      - name: Install Vercel CLI
        if: always()
        run: npm install -g vercel@50.37.3

      - name: Deploy to Vercel
        if: success()
        run: vercel deploy .next --prod --token=${{ secrets.VERCEL_TOKEN }}
