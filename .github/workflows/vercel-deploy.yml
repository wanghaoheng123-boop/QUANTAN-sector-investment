name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_pull:
        description: 'Skip vercel pull (use prebuilt artifacts only)'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@50.37.3

      - name: Pull Vercel Environment Information
        if: ${{ github.event.inputs.skip_pull != 'true' }}
        run: |
          echo "Running: vercel pull --yes --environment=production"
          EXIT_CODE=0
          OUTPUT=$(vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}" 2>&1) || EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            # Check if token is the likely cause
            if echo "$OUTPUT" | grep -qi "token\|unauthorized\|authentication\|invalid\|403\|401"; then
              echo ""
              echo "============================================"
              echo "ERROR: Vercel authentication failed."
              echo ""
              echo "Likely cause: The VERCEL_TOKEN secret is missing, expired, or invalid."
              echo ""
              echo "FIX: Go to https://vercel.com/settings/tokens → Create Token"
              echo "     Then add it to: GitHub → Settings → Secrets → Actions → New repository secret"
              echo "     Name: VERCEL_TOKEN"
              echo "============================================"
            fi
            exit $EXIT_CODE
          fi
          echo "vercel pull completed successfully"

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
