name: Deploy to Alibaba ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ecs-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.ECS_SSH_PORT }}" -H "${{ secrets.ECS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on ECS host
        shell: bash
        run: |
          ssh -p "${{ secrets.ECS_SSH_PORT }}" "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" << 'EOF'
            set -e
            cd "${{ secrets.ECS_APP_DIR }}"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            npm ci
            npm run build

            pm2 startOrReload ecosystem.config.js --env production
            pm2 save
          EOF
